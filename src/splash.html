<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Browser</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #0d1117;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      .splash {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        background: radial-gradient(ellipse at center, #161b22 0%, #0d1117 100%);
      }

      /* Центральный логотип */
      .logo-wrapper {
        position: relative;
        width: 200px;
        height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }

      /* Внешнее кольцо */
      .ring-outer {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #00d4ff;
        border-right-color: #0a84ff;
        animation: spin 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
      }

      /* Среднее кольцо */
      .ring-middle {
        position: absolute;
        width: 75%;
        height: 75%;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #00ff88;
        border-left-color: #00d4ff;
        animation: spin 3s cubic-bezier(0.4, 0, 0.2, 1) infinite reverse;
        box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
      }

      /* Внутреннее кольцо */
      .ring-inner {
        position: absolute;
        width: 50%;
        height: 50%;
        border-radius: 50%;
        border: 3px solid transparent;
        border-bottom-color: #0a84ff;
        border-left-color: #00ff88;
        animation: spin 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        box-shadow: 0 0 15px rgba(10, 132, 255, 0.3);
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* Центральная иконка */
      .logo-icon {
        position: absolute;
        font-size: 72px;
        filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.6));
        animation: iconPulse 2s ease-in-out infinite;
      }

      @keyframes iconPulse {
        0%, 100% { 
          transform: scale(1);
          filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.6));
        }
        50% { 
          transform: scale(1.1);
          filter: drop-shadow(0 0 35px rgba(0, 255, 136, 0.8));
        }
      }

      /* Название */
      .title {
        margin-top: 50px;
        font-size: 42px;
        font-weight: 800;
        letter-spacing: 12px;
        text-transform: uppercase;
        color: #ffffff;
        z-index: 10;
        opacity: 0;
        animation: titleFadeIn 0.8s ease-out 0.3s forwards;
        background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      @keyframes titleFadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
          letter-spacing: 4px;
        }
        to {
          opacity: 1;
          transform: translateY(0);
          letter-spacing: 12px;
        }
      }

      .subtitle {
        margin-top: 12px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 6px;
        text-transform: uppercase;
        z-index: 10;
        opacity: 0;
        animation: fadeIn 1s ease-out 0.6s forwards;
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      /* Круговой прогресс бар */
      .progress-container {
        position: absolute;
        bottom: 100px;
        width: 120px;
        height: 120px;
        z-index: 10;
      }

      .progress-ring {
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
      }

      .progress-ring__circle {
        transition: stroke-dashoffset 0.35s;
        transform-origin: 50% 50%;
      }

      .progress-ring__bg {
        fill: none;
        stroke: rgba(255, 255, 255, 0.1);
        stroke-width: 4;
      }

      .progress-ring__bar {
        fill: none;
        stroke: url(#progressGradient);
        stroke-width: 4;
        stroke-linecap: round;
        stroke-dasharray: 326.73;
        stroke-dashoffset: 326.73;
        animation: progressFill 4s ease-out forwards;
      }

      @keyframes progressFill {
        0% { stroke-dashoffset: 326.73; }
        100% { stroke-dashoffset: 0; }
      }

      .loading-text {
        position: absolute;
        bottom: 50px;
        width: 100%;
        text-align: center;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      /* Точки загрузки */
      .dots {
        position: absolute;
        bottom: 75px;
        display: flex;
        gap: 8px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: linear-gradient(135deg, #00d4ff, #00ff88);
        opacity: 0.3;
        animation: dotPulse 1.5s ease-in-out infinite;
      }

      .dot:nth-child(1) { animation-delay: 0s; }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes dotPulse {
        0%, 100% { 
          opacity: 0.3;
          transform: scale(1);
        }
        50% { 
          opacity: 1;
          transform: scale(1.3);
        }
      }

      /* Фоновые частицы */
      .particles {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
      }

      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(0, 212, 255, 0.5);
        border-radius: 50%;
        opacity: 0;
        animation: particleRise 4s ease-out infinite;
      }

      .particle:nth-child(1) { left: 10%; bottom: 10%; animation-delay: 0s; }
      .particle:nth-child(2) { left: 20%; bottom: 20%; animation-delay: 0.5s; }
      .particle:nth-child(3) { left: 30%; bottom: 15%; animation-delay: 1s; }
      .particle:nth-child(4) { left: 40%; bottom: 25%; animation-delay: 1.5s; }
      .particle:nth-child(5) { left: 60%; bottom: 10%; animation-delay: 0.3s; }
      .particle:nth-child(6) { left: 70%; bottom: 20%; animation-delay: 0.8s; }
      .particle:nth-child(7) { left: 80%; bottom: 15%; animation-delay: 1.3s; }
      .particle:nth-child(8) { left: 90%; bottom: 25%; animation-delay: 1.8s; }
      .particle:nth-child(9) { left: 15%; bottom: 30%; animation-delay: 0.6s; }
      .particle:nth-child(10) { left: 85%; bottom: 30%; animation-delay: 1.1s; }

      @keyframes particleRise {
        0% {
          opacity: 0;
          transform: translateY(0) scale(0);
        }
        20% {
          opacity: 1;
          transform: translateY(-30px) scale(1);
        }
        80% {
          opacity: 0.6;
          transform: translateY(-80px) scale(0.8);
        }
        100% {
          opacity: 0;
          transform: translateY(-120px) scale(0);
        }
      }

      /* Анимация исчезновения */
      .splash.fade-out {
        animation: fadeOut 0.6s ease-out forwards;
      }

      @keyframes fadeOut {
        to {
          opacity: 0;
          transform: scale(1.05);
        }
      }
    </style>
  </head>
  <body>
    <svg width="0" height="0">
      <defs>
        <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#00d4ff"/>
          <stop offset="100%" style="stop-color:#00ff88"/>
        </linearGradient>
      </defs>
    </svg>

    <div class="splash" id="splash">
      <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>

      <div class="logo-wrapper">
        <div class="ring-outer"></div>
        <div class="ring-middle"></div>
        <div class="ring-inner"></div>
        <div class="logo-icon">🌅</div>
      </div>

      <div class="title">Aurora</div>
      <div class="subtitle">Browser</div>

      <div class="progress-container">
        <svg class="progress-ring" width="120" height="120">
          <circle class="progress-ring__bg" cx="60" cy="60" r="52"/>
          <circle class="progress-ring__bar" cx="60" cy="60" r="52"/>
        </svg>
      </div>

      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="loading-text">Загрузка...</div>
    </div>

    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          splash.classList.add('fade-out');
          
          if (window.electronAPI) {
            window.electronAPI.splashReady();
          }
        }, 4000);
      });
    </script>
  </body>
</html>
