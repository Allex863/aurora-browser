<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Browser</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #0b0e14;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      .splash {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* Фоновые градиенты */
      .splash::before {
        content: '';
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(10, 132, 255, 0.15) 0%, transparent 70%);
        top: 20%;
        left: 30%;
        animation: float 8s ease-in-out infinite;
        filter: blur(40px);
      }

      .splash::after {
        content: '';
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(255, 95, 87, 0.1) 0%, transparent 70%);
        bottom: 20%;
        right: 25%;
        animation: float 10s ease-in-out infinite reverse;
        filter: blur(40px);
      }

      @keyframes float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(30px, -30px) scale(1.05); }
        50% { transform: translate(-20px, 20px) scale(0.95); }
        75% { transform: translate(20px, 30px) scale(1.02); }
      }

      /* Логотип */
      .logo-container {
        position: relative;
        width: 140px;
        height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }

      .logo-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #0a84ff;
        border-right-color: rgba(10, 132, 255, 0.5);
        animation: spin 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      .logo-ring:nth-child(2) {
        width: 80%;
        height: 80%;
        border-top-color: #ff5f57;
        border-right-color: rgba(255, 95, 87, 0.5);
        animation: spin 2s cubic-bezier(0.4, 0, 0.2, 1) infinite reverse;
        animation-delay: -0.3s;
      }

      .logo-ring:nth-child(3) {
        width: 60%;
        height: 60%;
        border-top-color: #28c840;
        border-right-color: rgba(40, 200, 64, 0.5);
        animation: spin 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        animation-delay: -0.5s;
      }

      .logo-icon {
        position: absolute;
        font-size: 48px;
        color: #e8eefc;
        text-shadow: 0 0 20px rgba(10, 132, 255, 0.5);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { 
          transform: scale(1);
          opacity: 1;
        }
        50% { 
          transform: scale(1.08);
          opacity: 0.85;
        }
      }

      /* Название */
      .title {
        margin-top: 40px;
        font-size: 32px;
        font-weight: 700;
        color: #e8eefc;
        letter-spacing: 2px;
        z-index: 10;
        opacity: 0;
        animation: fadeInUp 0.8s ease-out 0.3s forwards;
      }

      .subtitle {
        margin-top: 12px;
        font-size: 14px;
        color: rgba(232, 238, 252, 0.6);
        letter-spacing: 1px;
        z-index: 10;
        opacity: 0;
        animation: fadeInUp 0.8s ease-out 0.5s forwards;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Прогресс бар */
      .progress-container {
        position: absolute;
        bottom: 80px;
        width: 280px;
        z-index: 10;
      }

      .progress-bar {
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #0a84ff, #00d4ff);
        border-radius: 2px;
        animation: progress 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes progress {
        0% { width: 0%; }
        30% { width: 45%; }
        60% { width: 75%; }
        85% { width: 90%; }
        100% { width: 100%; }
      }

      .loading-text {
        text-align: center;
        margin-top: 12px;
        font-size: 12px;
        color: rgba(232, 238, 252, 0.5);
        letter-spacing: 0.5px;
      }

      /* Анимация исчезновения */
      .splash.fade-out {
        animation: fadeOut 0.5s ease-out forwards;
      }

      @keyframes fadeOut {
        to {
          opacity: 0;
          transform: scale(1.05);
        }
      }

      /* Частицы */
      .particles {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
      }

      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(10, 132, 255, 0.6);
        border-radius: 50%;
        opacity: 0;
        animation: particleFloat 3s ease-out infinite;
      }

      .particle:nth-child(1) { left: 10%; top: 60%; animation-delay: 0s; }
      .particle:nth-child(2) { left: 20%; top: 40%; animation-delay: 0.5s; }
      .particle:nth-child(3) { left: 30%; top: 70%; animation-delay: 1s; }
      .particle:nth-child(4) { left: 40%; top: 30%; animation-delay: 1.5s; }
      .particle:nth-child(5) { left: 60%; top: 65%; animation-delay: 0.3s; }
      .particle:nth-child(6) { left: 70%; top: 35%; animation-delay: 0.8s; }
      .particle:nth-child(7) { left: 80%; top: 55%; animation-delay: 1.3s; }
      .particle:nth-child(8) { left: 90%; top: 45%; animation-delay: 1.8s; }

      @keyframes particleFloat {
        0% {
          opacity: 0;
          transform: translateY(0) scale(0);
        }
        20% {
          opacity: 1;
          transform: translateY(-20px) scale(1);
        }
        80% {
          opacity: 0.8;
          transform: translateY(-60px) scale(0.8);
        }
        100% {
          opacity: 0;
          transform: translateY(-80px) scale(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="splash" id="splash">
      <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>
      
      <div class="logo-container">
        <div class="logo-ring"></div>
        <div class="logo-ring"></div>
        <div class="logo-ring"></div>
        <div class="logo-icon">🌅</div>
      </div>
      
      <div class="title">AURORA</div>
      <div class="subtitle">Browser</div>
      
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <div class="loading-text">Загрузка...</div>
      </div>
    </div>

    <script>
      // Сигнал главному процессу о готовности
      window.addEventListener('load', () => {
        // Автоматически скрываем splash через 2.5 секунды
        setTimeout(() => {
          const splash = document.getElementById('splash');
          splash.classList.add('fade-out');
          
          // Сообщаем главному процессу
          if (window.electronAPI) {
            window.electronAPI.splashReady();
          }
        }, 2500);
      });
    </script>
  </body>
</html>
