<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Browser</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #0d1117;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      .splash {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        background: radial-gradient(ellipse at center, #161b22 0%, #0d1117 100%);
      }

      /* Логотип - абстрактная аврора */
      .logo-wrapper {
        position: relative;
        width: 180px;
        height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }

      /* Градиентные дуги */
      .aurora-arc {
        position: absolute;
        border-radius: 50%;
        border: 4px solid transparent;
        animation: rotate 3s linear infinite;
      }

      .arc-1 {
        width: 100%;
        height: 100%;
        border-top-color: #00d4ff;
        border-right-color: rgba(0, 212, 255, 0.3);
        filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.5));
      }

      .arc-2 {
        width: 80%;
        height: 80%;
        border-bottom-color: #00ff88;
        border-left-color: rgba(0, 255, 136, 0.3);
        animation: rotate 4s linear infinite reverse;
        filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.4));
      }

      .arc-3 {
        width: 60%;
        height: 60%;
        border-top-color: #0a84ff;
        border-right-color: rgba(10, 132, 255, 0.3);
        animation: rotate 5s linear infinite;
        filter: drop-shadow(0 0 8px rgba(10, 132, 255, 0.5));
      }

      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* Центральное свечение */
      .glow-center {
        position: absolute;
        width: 40%;
        height: 40%;
        background: radial-gradient(ellipse, rgba(0, 212, 255, 0.4) 0%, transparent 70%);
        border-radius: 50%;
        animation: glow 2s ease-in-out infinite;
      }

      @keyframes glow {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); }
      }

      /* Название */
      .title {
        margin-top: 40px;
        font-size: 48px;
        font-weight: 800;
        letter-spacing: 14px;
        text-transform: uppercase;
        color: #ffffff;
        z-index: 10;
        opacity: 0;
        animation: titleFadeIn 0.8s ease-out 0.3s forwards;
        background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      @keyframes titleFadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
          letter-spacing: 6px;
        }
        to {
          opacity: 1;
          transform: translateY(0);
          letter-spacing: 14px;
        }
      }

      .subtitle {
        margin-top: 14px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 8px;
        text-transform: uppercase;
        z-index: 10;
        opacity: 0;
        animation: fadeIn 1s ease-out 0.6s forwards;
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      /* Линейный прогресс бар */
      .progress-container {
        position: absolute;
        bottom: 80px;
        width: 280px;
        z-index: 10;
      }

      .progress-track {
        width: 100%;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00d4ff, #00ff88);
        border-radius: 2px;
        animation: progressFill 4s ease-out forwards;
        box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
      }

      @keyframes progressFill {
        0% { width: 0%; }
        100% { width: 100%; }
      }

      .loading-text {
        position: absolute;
        bottom: 55px;
        width: 100%;
        text-align: center;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      /* Фоновые частицы */
      .particles {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
      }

      .particle {
        position: absolute;
        width: 3px;
        height: 3px;
        background: rgba(0, 212, 255, 0.6);
        border-radius: 50%;
        opacity: 0;
        animation: particleRise 4s ease-out infinite;
      }

      .particle:nth-child(1) { left: 10%; bottom: 10%; animation-delay: 0s; }
      .particle:nth-child(2) { left: 20%; bottom: 20%; animation-delay: 0.5s; }
      .particle:nth-child(3) { left: 30%; bottom: 15%; animation-delay: 1s; }
      .particle:nth-child(4) { left: 40%; bottom: 25%; animation-delay: 1.5s; }
      .particle:nth-child(5) { left: 60%; bottom: 10%; animation-delay: 0.3s; }
      .particle:nth-child(6) { left: 70%; bottom: 20%; animation-delay: 0.8s; }
      .particle:nth-child(7) { left: 80%; bottom: 15%; animation-delay: 1.3s; }
      .particle:nth-child(8) { left: 90%; bottom: 25%; animation-delay: 1.8s; }

      @keyframes particleRise {
        0% {
          opacity: 0;
          transform: translateY(0) scale(0);
        }
        20% {
          opacity: 1;
          transform: translateY(-30px) scale(1);
        }
        80% {
          opacity: 0.6;
          transform: translateY(-80px) scale(0.8);
        }
        100% {
          opacity: 0;
          transform: translateY(-120px) scale(0);
        }
      }

      /* Анимация исчезновения */
      .splash.fade-out {
        animation: fadeOut 0.5s ease-out forwards;
      }

      @keyframes fadeOut {
        to {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="splash" id="splash">
      <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>

      <div class="logo-wrapper">
        <div class="aurora-arc arc-1"></div>
        <div class="aurora-arc arc-2"></div>
        <div class="aurora-arc arc-3"></div>
        <div class="glow-center"></div>
      </div>

      <div class="title">Aurora</div>
      <div class="subtitle">Browser</div>

      <div class="progress-container">
        <div class="progress-track">
          <div class="progress-bar"></div>
        </div>
      </div>

      <div class="loading-text">Загрузка...</div>
    </div>

    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          splash.classList.add('fade-out');
          
          // Отправляем сигнал главному процессу
          if (window.electronAPI) {
            window.electronAPI.splashReady();
          }
          
          // Закрываем окно через небольшую задержку
          setTimeout(() => {
            window.close();
          }, 500);
        }, 4000);
      });
    </script>
  </body>
</html>
