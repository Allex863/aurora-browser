<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Browser</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #0a0b10;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      .splash {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* Волны авроры */
      .aurora-wave {
        position: absolute;
        width: 200%;
        height: 200%;
        top: -50%;
        left: -50%;
        background: conic-gradient(
          from 0deg at 50% 50%,
          transparent 0deg,
          rgba(0, 212, 255, 0.03) 60deg,
          rgba(0, 255, 136, 0.06) 120deg,
          rgba(10, 132, 255, 0.04) 180deg,
          rgba(0, 255, 136, 0.05) 240deg,
          rgba(0, 212, 255, 0.03) 300deg,
          transparent 360deg
        );
        animation: auroraRotate 20s linear infinite;
        filter: blur(60px);
      }

      .aurora-wave:nth-child(2) {
        animation-direction: reverse;
        animation-duration: 25s;
        opacity: 0.7;
      }

      .aurora-wave:nth-child(3) {
        animation-duration: 30s;
        opacity: 0.5;
      }

      @keyframes auroraRotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* Центральный элемент - сфера */
      .sphere-container {
        position: relative;
        width: 160px;
        height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }

      .sphere {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: radial-gradient(
          ellipse at 30% 30%,
          rgba(10, 132, 255, 0.8) 0%,
          rgba(0, 100, 200, 0.6) 40%,
          rgba(0, 50, 100, 0.4) 70%,
          rgba(0, 20, 40, 0.2) 100%
        );
        box-shadow: 
          0 0 60px rgba(10, 132, 255, 0.5),
          0 0 100px rgba(0, 212, 255, 0.3),
          inset 0 0 40px rgba(10, 132, 255, 0.4),
          inset 0 0 80px rgba(0, 255, 136, 0.2);
        animation: spherePulse 3s ease-in-out infinite;
      }

      @keyframes spherePulse {
        0%, 100% { 
          transform: scale(1);
          box-shadow: 
            0 0 60px rgba(10, 132, 255, 0.5),
            0 0 100px rgba(0, 212, 255, 0.3),
            inset 0 0 40px rgba(10, 132, 255, 0.4),
            inset 0 0 80px rgba(0, 255, 136, 0.2);
        }
        50% { 
          transform: scale(1.05);
          box-shadow: 
            0 0 80px rgba(10, 132, 255, 0.7),
            0 0 120px rgba(0, 212, 255, 0.4),
            inset 0 0 50px rgba(10, 132, 255, 0.5),
            inset 0 0 100px rgba(0, 255, 136, 0.3);
        }
      }

      /* Орбиты вокруг сферы */
      .orbit {
        position: absolute;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: rgba(0, 212, 255, 0.6);
        border-bottom-color: rgba(0, 255, 136, 0.4);
      }

      .orbit-1 {
        width: 200px;
        height: 200px;
        animation: orbitSpin 4s linear infinite;
      }

      .orbit-2 {
        width: 240px;
        height: 240px;
        animation: orbitSpin 6s linear infinite reverse;
        border-left-color: rgba(10, 132, 255, 0.5);
        border-right-color: rgba(0, 212, 255, 0.3);
      }

      .orbit-3 {
        width: 280px;
        height: 280px;
        animation: orbitSpin 8s linear infinite;
        border-top-color: rgba(0, 255, 136, 0.4);
        border-bottom-color: rgba(10, 132, 255, 0.3);
      }

      @keyframes orbitSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* Логотип внутри сферы */
      .logo {
        position: absolute;
        font-size: 64px;
        z-index: 20;
        filter: drop-shadow(0 0 20px rgba(10, 132, 255, 0.8));
        animation: logoGlow 2s ease-in-out infinite;
      }

      @keyframes logoGlow {
        0%, 100% { 
          filter: drop-shadow(0 0 20px rgba(10, 132, 255, 0.8));
          transform: scale(1);
        }
        50% { 
          filter: drop-shadow(0 0 40px rgba(0, 255, 136, 1));
          transform: scale(1.08);
        }
      }

      /* Название */
      .title {
        margin-top: 50px;
        font-size: 36px;
        font-weight: 800;
        letter-spacing: 8px;
        text-transform: uppercase;
        background: linear-gradient(
          135deg,
          #0a84ff 0%,
          #00d4ff 50%,
          #00ff88 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        z-index: 10;
        opacity: 0;
        animation: titleReveal 1s ease-out 0.5s forwards;
      }

      @keyframes titleReveal {
        from {
          opacity: 0;
          letter-spacing: 0px;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          letter-spacing: 8px;
          transform: translateY(0);
        }
      }

      .subtitle {
        margin-top: 10px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 4px;
        text-transform: uppercase;
        z-index: 10;
        opacity: 0;
        animation: fadeIn 1s ease-out 0.8s forwards;
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      /* Индикатор загрузки - волна */
      .loader-container {
        position: absolute;
        bottom: 80px;
        width: 200px;
        height: 60px;
        z-index: 10;
        overflow: hidden;
      }

      .wave-loader {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .wave-bar {
        position: absolute;
        bottom: 0;
        width: 8px;
        background: linear-gradient(to top, #0a84ff, #00d4ff, #00ff88);
        border-radius: 4px;
        animation: waveAnimation 1.2s ease-in-out infinite;
      }

      .wave-bar:nth-child(1) { left: 0%; height: 20%; animation-delay: 0s; }
      .wave-bar:nth-child(2) { left: 15%; height: 40%; animation-delay: 0.1s; }
      .wave-bar:nth-child(3) { left: 30%; height: 60%; animation-delay: 0.2s; }
      .wave-bar:nth-child(4) { left: 45%; height: 80%; animation-delay: 0.3s; }
      .wave-bar:nth-child(5) { left: 60%; height: 100%; animation-delay: 0.4s; }
      .wave-bar:nth-child(6) { left: 75%; height: 80%; animation-delay: 0.5s; }
      .wave-bar:nth-child(7) { left: 90%; height: 60%; animation-delay: 0.6s; }

      @keyframes waveAnimation {
        0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
        50% { transform: scaleY(1); opacity: 1; }
      }

      .loading-text {
        position: absolute;
        bottom: 40px;
        width: 100%;
        text-align: center;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* Звёзды на фоне */
      .stars {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
      }

      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        opacity: 0;
        animation: twinkle 3s ease-in-out infinite;
      }

      .star:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
      .star:nth-child(2) { left: 20%; top: 60%; animation-delay: 0.5s; }
      .star:nth-child(3) { left: 30%; top: 30%; animation-delay: 1s; }
      .star:nth-child(4) { left: 40%; top: 80%; animation-delay: 1.5s; }
      .star:nth-child(5) { left: 60%; top: 15%; animation-delay: 0.3s; }
      .star:nth-child(6) { left: 70%; top: 70%; animation-delay: 0.8s; }
      .star:nth-child(7) { left: 80%; top: 40%; animation-delay: 1.3s; }
      .star:nth-child(8) { left: 90%; top: 90%; animation-delay: 1.8s; }
      .star:nth-child(9) { left: 15%; top: 85%; animation-delay: 0.2s; }
      .star:nth-child(10) { left: 85%; top: 10%; animation-delay: 0.7s; }
      .star:nth-child(11) { left: 50%; top: 5%; animation-delay: 1.2s; }
      .star:nth-child(12) { left: 5%; top: 50%; animation-delay: 1.7s; }

      @keyframes twinkle {
        0%, 100% { opacity: 0; transform: scale(0); }
        50% { opacity: 1; transform: scale(1); }
      }

      /* Анимация исчезновения */
      .splash.fade-out {
        animation: fadeOut 0.6s ease-out forwards;
      }

      @keyframes fadeOut {
        to {
          opacity: 0;
          transform: scale(1.1);
        }
      }
    </style>
  </head>
  <body>
    <div class="splash" id="splash">
      <div class="aurora-wave"></div>
      <div class="aurora-wave"></div>
      <div class="aurora-wave"></div>
      
      <div class="stars">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
      </div>
      
      <div class="orbit orbit-1"></div>
      <div class="orbit orbit-2"></div>
      <div class="orbit orbit-3"></div>
      
      <div class="sphere-container">
        <div class="sphere"></div>
        <div class="logo">🌅</div>
      </div>
      
      <div class="title">Aurora</div>
      <div class="subtitle">Browser</div>
      
      <div class="loader-container">
        <div class="wave-loader">
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
        </div>
      </div>
      
      <div class="loading-text">Загрузка...</div>
    </div>

    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          splash.classList.add('fade-out');
          
          if (window.electronAPI) {
            window.electronAPI.splashReady();
          }
        }, 3000);
      });
    </script>
  </body>
</html>
